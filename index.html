<!DOCTYPE html>
<html lang="en">
<head>
    <title>Digital Business Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #3498db); /* Professional gradient */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            width: 340px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            padding: 25px;
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #3498db;
        }

        .card h2 {
            margin: 5px 0;
            color: #2c3e50;
        }

        .card h4 {
            margin: 5px 0 15px;
            color: #777;
            font-weight: normal;
        }

        .info {
            font-size: 14px;
            color: #555;
            line-height: 1.8;
        }

        .info a {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
            transition: color 0.3s;
        }

        .info a:hover {
            color: #1abc9c;
        }
        div.linkedin-btn {
            display: inline-block;
            background: #0073b1;
            color: #fff;
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .linkedin-btn:hover {
            background: #005582;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="profile.png.jpeg" alt="parrot">
        <h2>SHELAM NAVYA</h2>
        <h4>Student of MRDU</h4>
        <div class="info">
            <div>PHONE:<a href="tel:+919666900803"> +91 9666900803</a></div>
            <div>E-mail:<a href="mailto:navya.shelam.malesh@gmail.com">navya.shelam.malesh@gmail.com</a></div>
            <div>Address:<a href="https://www.google.com/maps/search/Secunderabad,+Telangana" target="_blank"> Secunderabad, Telangana</a></div>
            <div><a href="www.linkedin.com/in/navya-shelam-3159303a7" class="linkedin-btn" target="_blank">View LinkedIn Profile</a></div>
        </div>
    </div>
</body>
</html>
